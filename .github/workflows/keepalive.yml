name: Supabase keepalive

# Supabase gratisnivå pausar projekt efter 7 dagars inaktivitet.
# Den här pingen var tredje dag räknas som aktivitet och håller databasen vaken.
on:
  schedule:
    - cron: "17 5 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Pinga databasen
        run: |
          curl -sf "${{ vars.SUPABASE_URL }}/rest/v1/exercises?select=id&limit=1" \
            -H "apikey: ${{ vars.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ vars.SUPABASE_ANON_KEY }}" > /dev/null
          echo "Supabase svarar ✓"
